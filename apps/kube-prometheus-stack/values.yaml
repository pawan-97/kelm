# ----- Grafana -----
grafana:
  enabled: true
  adminUser: admin
  # Store the password in a Kubernetes Secret and reference it:
  # kubectl create secret generic grafana-admin-secret \
  #   --from-literal=admin-password=<your-password> -n monitoring
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password

  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 500Mi

  persistence:
    enabled: true
    storageClassName: local-path   # ← change to your storage class
    size: 1Gi

  # Default Kubernetes dashboards included with the chart
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: browser

  # Sidecar auto-loads any ConfigMap labelled grafana_dashboard=1
  # from ALL namespaces — so apps can ship their own dashboards.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL   # ← ALL = every namespace, not just monitoring

  # No ingress by default — use port-forward or add your own
  ingress:
    enabled: false
    # To enable:
    # enabled: true
    # ingressClassName: nginx
    # annotations:
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    # hosts:
    #   - grafana.your-domain.com
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.your-domain.com

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/"

# ----- Prometheus Operator -----
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 64Mi

# ----- Node Exporter — runs on every node -----
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 30Mi
    limits:
      cpu: 50m
      memory: 50Mi

# ----- Kube State Metrics -----
kube-state-metrics:
  enabled: true
  # Collect metrics for all namespaces (default behaviour)
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 64Mi

# ----- Default alerting rules -----
defaultRules:
  create: true
  rules:
    alertmanager: false
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
