# ============================================================
# kube-prometheus-stack — Single Values File
# Prometheus scrapes metrics from ALL namespaces cluster-wide.
# Adjust resource sizes to match your node capacity.
# ============================================================

# ----- Prometheus -----
prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    retentionSize: "2GiB"

    # ── Cross-namespace scraping ──────────────────────────────
    # Setting these to {} (empty selector) means "match ALL"
    # ServiceMonitors in every namespace are discovered automatically.
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # Same for PodMonitors — pick up from every namespace
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # ProbeMonitors (Blackbox) — all namespaces
    probeSelector: {}
    probeNamespaceSelector: {}

    # PrometheusRules — all namespaces
    ruleSelector: {}
    ruleNamespaceSelector: {}

    # These MUST be false when using the empty selectors above —
    # otherwise the Helm chart overrides them back to helm-scoped values
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    # ─────────────────────────────────────────────────────────

    # Resources — tune to your cluster size
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 100m
        memory: 500Mi

    # Persistent storage for metrics
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path   # ← change to your storage class (gp3, ssd, etc.)
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # Extra scrape configs for targets without ServiceMonitors
    additionalScrapeConfigs: []

    # RBAC — allow Prometheus to read from all namespaces
    # (ClusterRole is created automatically by the chart)

# ----- Alertmanager -----
alertmanager:
